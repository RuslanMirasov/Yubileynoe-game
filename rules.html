<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#E22722" />
    <meta name="description" content="Юбилейное" />
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.ico" />
    <link rel="stylesheet" href="./assets/css/styles.min.css" />
    <title>Правила</title>
  </head>
  <body>
    <div class="preloader">
      <img src="./assets/img/cookie.gif" alt="Юбилейное" />
    </div>

    <main class="main">
      <section class="rules-page">
        <div class="animated-background">
          <div class="bg"></div>
        </div>

        <div class="container">
          <ul class="rules">
            <li class="anim-top slower">
              <p class="subtitle">Ловите печенье<br />«Юбилейное» и&nbsp;собирайте<br />в&nbsp;корзину</p>
            </li>
            <li class="anim-top slower">
              <p class="subtitle">Будьте внимательны: за&nbsp;другие <br />угощения снимаются очки</p>
            </li>
            <li class="anim-top slower">
              <p class="subtitle">Соберите XX печенек<br />за&nbsp;1&nbsp;минуту — и получите 100&nbsp;баллов на&nbsp;следующую&nbsp;покупку!</p>
            </li>
          </ul>

          <div class="buttons">
            <p class="subtitle anim-bottom">Готовы проверить свою ловкость? Тогда начинаем!</p>
            <a href="./game.html" class="button anim-bottom"><span>Играть</span></a>
          </div>
        </div>
      </section>
    </main>

    <script src="./assets/js/scripts.js" type="module" defer></script>
  </body>
</html>
