<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#E22722" />
    <meta name="description" content="Юбилейное" />
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon.ico" />
    <link rel="stylesheet" href="./assets/css/styles.min.css" />
    <title>Правила</title>
  </head>
  <body>
    <div class="preloader">
      <img src="./assets/img/cookie.gif" alt="Юбилейное" />
    </div>

    <main class="main">
      <section class="game-page">
        <div class="animated-background">
          <div class="bg"></div>
        </div>

        <div class="container">
          <!--POINTS-->
          <div class="points anim-top">
            <div class="bank" data-target-bank>
              <div class="point lose"><span data-target-points>0</span></div>
            </div>

            <div class="bank" data-my-bank>
              <div class="point win"><span data-my-points>0</span></div>
            </div>
          </div>

          <!--GAME CANVAS-->
          <div class="game-canvas" data-game-canvas>
            <!--FALLING OBJECTS-->
            <!-- 
            <div class="falling-item cookie" data-plus></div>
            <div class="falling-item apple" data-minus></div>
            <div class="falling-item cock" data-minus></div>
            <div class="falling-item baranka" data-minus></div> 
            -->

            <!--BASKET-->
            <div class="basket basket-shadow" data-basket-back></div>
            <div class="basket" data-basket>
              <div data-target-scanner></div>
            </div>
            <!--BASKET END-->
          </div>
        </div>
      </section>
    </main>

    <!--POPUPS-->

    <!--GAME-OVER POPUP-->
    <div class="popup" id="try-again">
      <div class="popup__content">
        <img src="./assets/img/logo.svg" alt="Юбилейное" class="logo" />

        <div class="game-results">
          <img src="./assets/img/lose.webp" alt="Юбилейное" class="popup-image lose" />
          <h2 class="title">Вы были так <br />близки к&nbsp;победе!</h2>
          <p class="text"><span data-my-points>14</span> печенек уже в корзине — давайте <br />попробуем ещё раз!</p>
        </div>

        <div class="buttons">
          <button class="button" data-restart-game><span>Играть снова</span></button>
          <a href="./" class="button small"><span>Выйти</span></a>
        </div>
      </div>
    </div>

    <!--SUCCESS POPUP-->
    <div class="popup" id="success">
      <div class="popup__content">
        <img src="./assets/img/logo.svg" alt="Юбилейное" class="logo" />

        <div class="game-results">
          <img src="./assets/img/winn.webp" alt="Юбилейное" class="popup-image winn" />
          <h2 class="title">Вот это улов!</h2>
          <p class="text">
            <span data-my-points>20</span> печенек в&nbsp;корзине —<br />вы&nbsp;справились! <br />Забирайте приз и&nbsp;возвращайтесь
            <br />за&nbsp;новым рекордом.
          </p>
        </div>

        <div class="buttons">
          <button class="button" data-restart-game><span>Играть заново</span></button>
          <a href="#" class="button small"><span>Забрать приз</span></a>
        </div>
      </div>
    </div>

    <!--SCRIPTS-->
    <script src="./assets/js/scripts.js" type="module" defer></script>
  </body>
</html>
